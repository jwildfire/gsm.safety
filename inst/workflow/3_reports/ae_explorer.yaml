meta:
  Type: Report
  ID: ae_explorer
  Output: html
  Name: AE Explorer Report
  Description: AE Explorer report scaffold for SafetyGraphics-style adverse event review
  ParentIssue: 10
  domains:
    dm: Mapped_SUBJ
    aes: Mapped_AE
  widgetSettings:
    dm:
      id_col: subjid
      treatment_col:
    aes:
      id_col: subjid
      term_col: mdrpt_nsv
      bodsys_col: mdrsoc_nsv
  optionalFilters:
    seriousness: aeser
    severity: aetoxgr
    relationship: aerel
  knownGaps:
    treatment_col: No clear treatment/group field identified in current Mapped_SUBJ.
    aeout: No current Mapped_AE outcome field identified.
spec:
  Mapped_SUBJ:
    _all:
      required: true
    subjid:
      type: character
  Mapped_AE:
    _all:
      required: true
    subjid:
      type: character
    mdrpt_nsv:
      type: character
    mdrsoc_nsv:
      type: character
    aeser:
      type: character
      required: false
    aetoxgr:
      type: integer
      required: false
    aerel:
      type: character
      required: false
steps:
  - output: AeExplorerData
    name: gsm.safety::MakeAeExplorerData
    params:
      lData: lData
      lMeta: lMeta
  - output: InitializedAeExplorer
    name: safetyCharts::init_aeExplorer
    params:
      data: AeExplorerData
      settings: widgetSettings
  - output: strOutputDir
    name: getwd
  - output: Report
    name: gsm.safety::RenderAeExplorerWidget
    params:
      lInitialized: InitializedAeExplorer
      strOutputDir: strOutputDir
      strOutputFile: ID
