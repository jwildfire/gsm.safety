meta:
  Type: Report
  ID: ae_explorer
  Output: html
  Name: AE Explorer Report
  Description: AE Explorer report scaffold for SafetyGraphics-style adverse event review
  ParentIssue: 10
spec:
  Mapped_SUBJ:
    _all:
      required: true
    subjid:
      type: character
  Mapped_AE:
    _all:
      required: true
    subjid:
      type: character
    mdrpt_nsv:
      type: character
    mdrsoc_nsv:
      type: character
    aeser:
      type: character
      required: false
    aetoxgr:
      type: integer
      required: false
    aerel:
      type: character
      required: false
steps:
  - output: AeExplorerSettings
    name: gsm.safety::MakeAeExplorerSettings
    params:
      lSpec: lSpec
  - output: AeExplorerManifest
    name: gsm.safety::MakeAeExplorerManifest
    params:
      lData: lData
      lSettings: AeExplorerSettings
      lMeta: lMeta
  - output: strOutputDir
    name: getwd
  - output: Report
    name: gsm.safety::Report_AE_Explorer
    params:
      lData: lData
      lSettings: AeExplorerSettings
      lManifest: AeExplorerManifest
      strOutputDir: strOutputDir
      strOutputFile: ID
