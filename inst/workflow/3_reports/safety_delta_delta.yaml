meta:
  Type: Report
  ID: safety_delta_delta
  Output: html
  Name: Safety Delta-Delta Report
  Description: Interactive safety.viz delta-delta plot of change-from-baseline in two labs measures.
  lSettings:
    filters:
      - value_col: SITE
        label: Site
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: ARM
        label: Treatment Group
      - value_col: USUBJID
        label: Participant ID
    measure_x: Alanine Aminotransferase
    measure_y: Aspartate Aminotransferase
    add_regression_line: true
spec:
  dfResults:
    USUBJID:
      type: character
    TEST:
      type: character
    STRESN:
      type: numeric
    VISIT:
      type: character
steps:
  - output: strOutputDir
    name: getwd
  - output: lWidget
    name: gsm.safety::Widget_DeltaDelta
    params:
      dfResults: dfResults
      lSettings: lSettings
  - output: strReportPath
    name: gsm.safety::SaveWidgetReport
    params:
      widget: lWidget
      strOutputDir: strOutputDir
      strOutputFile: ID
