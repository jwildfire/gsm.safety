meta:
  Type: Report
  ID: safety_results_over_time
  Output: html
  Name: Safety Results Over Time Report
  Description: Interactive safety.viz results-over-time chart of long-format labs and vitals across visits.
  lSettings:
    filters:
      - value_col: SITEID
        label: Site ID
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: ARM
        label: Treatment Group
    groups:
      - value_col: ARM
        label: Treatment Group
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: SITEID
        label: Site
    group_by: ARM
spec:
  dfResults:
    USUBJID:
      type: character
    TEST:
      type: character
    VISIT:
      type: character
    STRESN:
      type: numeric
steps:
  - output: strOutputDir
    name: getwd
  - output: lWidget
    name: gsm.safety::Widget_ResultsOverTime
    params:
      dfResults: dfResults
      lSettings: lSettings
  - output: strReportPath
    name: gsm.safety::SaveWidgetReport
    params:
      widget: lWidget
      strOutputDir: strOutputDir
      strOutputFile: ID
