meta:
  Type: Report
  ID: safety_shift_plot
  Output: html
  Name: Safety Shift Plot Report
  Description: Interactive safety.viz shift plot pairing baseline and comparison visit results.
  lSettings:
    filters:
      - value_col: SITEID
        label: Site ID
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: ARM
        label: Treatment Group
    baseline_visits:
      - Baseline
    comparison_visits:
      - Week 26
spec:
  dfResults:
    USUBJID:
      type: character
    TEST:
      type: character
    VISIT:
      type: character
    STRESN:
      type: numeric
steps:
  - output: strOutputDir
    name: getwd
  - output: lWidget
    name: gsm.safety::Widget_ShiftPlot
    params:
      dfResults: dfResults
      lSettings: lSettings
  - output: strReportPath
    name: gsm.safety::SaveWidgetReport
    params:
      widget: lWidget
      strOutputDir: strOutputDir
      strOutputFile: ID
