meta:
  Type: Report
  ID: safety_histogram
  Output: html
  Name: Safety Histogram Report
  Description: Interactive safety.viz histogram of long-format labs and vitals results.
  lSettings:
    filters:
      - value_col: SITEID
        label: Site ID
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: ARM
        label: Treatment Group
      - value_col: USUBJID
        label: Participant ID
    groups:
      - value_col: SITE
        label: Site
      - value_col: SEX
        label: Sex
      - value_col: RACE
        label: Race
      - value_col: ARM
        label: Treatment Group
    display_normal_range: true
    annotate_bin_boundaries: true
    test_normality: true
    group_by: ARM
    compare_distributions: true
spec:
  dfResults:
    USUBJID:
      type: character
    TEST:
      type: character
    STRESN:
      type: numeric
steps:
  - output: strOutputDir
    name: getwd
  - output: lWidget
    name: gsm.safety::Widget_Histogram
    params:
      dfResults: dfResults
      lSettings: lSettings
  - output: strReportPath
    name: gsm.safety::SaveWidgetReport
    params:
      widget: lWidget
      strOutputDir: strOutputDir
      strOutputFile: ID
