meta:
  Type: Report
  ID: nep_explorer
  Output: html
  Name: Nep Explorer Report
  Description: Nep Explorer report scaffold for SafetyCharts lab review
  ParentIssue: 19
  domains:
    labs: Mapped_LB
  widgetName: nepExplorer
  widgetSettings:
    id_col: subjid
    visit_col: visit
    visitn_col: visitn
    studyday_col: studyday
    measure_col: measure
    value_col: value
    unit_col: unit
    normal_col_low: normal_low
    normal_col_high: normal_high
    baseline_col: baseline_flag
    baseline_value: Y
    baseline:
      value_col: baseline_flag
      values:
        - Y
    measure_values:
      creat: CREAT
      egfr_creat: EGFR
    filters:
      - value_col: sex
        label: Sex
      - value_col: visit
        label: Visit
    groups:
      - value_col: sex
        label: Sex
    details:
      - value_col: visit
        label: Visit
      - value_col: studyday
        label: Study Day
spec:
  Mapped_LB:
    _all:
      required: true
    subjid:
      type: character
    visit:
      type: character
    visitn:
      type: integer
    studyday:
      type: integer
    measure:
      type: character
    value:
      type: numeric
    unit:
      type: character
      required: false
    normal_low:
      type: numeric
      required: false
    normal_high:
      type: numeric
      required: false
    baseline_flag:
      type: character
      required: false
    sex:
      type: character
      required: false
steps:
  - output: InitializedWidget
    name: list
    params:
      data: Mapped_LB
      settings: widgetSettings
  - output: strOutputDir
    name: getwd
  - output: Report
    name: gsm.safety::RenderSafetyChartsWidget
    params:
      lInitialized: InitializedWidget
      strWidgetName: widgetName
      strOutputDir: strOutputDir
      strOutputFile: ID
